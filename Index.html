<!DOCTYPE html>
<html lang="nl">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lege pallets AWC</title>

<style>
body{font-family:Arial;background:#eef2f5;margin:0;padding:10px;}
.container{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
.logo{max-width:200px;display:block;margin:auto;}
h2{text-align:center;}
input,select,textarea{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:8px;font-weight:bold;}
.primary{background:black;color:white;}
.secondary{background:#e5e7eb;}
.signature{border:1px solid #ccc;height:120px;border-radius:8px;}
</style>
</head>

<body>
<div class="container">

<img src="data:image/png;base64," class="logo">

<h2 id="title">Lege pallets AWC</h2>

<select id="lang" onchange="setLang()">
<option value="nl">Nederlands</option>
<option value="en">English</option>
</select>

<select id="loc">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<input type="date" id="date">
<select id="day"></select>

<input type="number" id="euro" placeholder="Europallets">
<input type="number" id="blok" placeholder="Blokpallets">
<input type="number" id="m2" placeholder="2m pallets">
<input type="number" id="dpb" placeholder="DPB pallets">

<input type="text" id="name" placeholder="Naam">
<textarea id="note" placeholder="Opmerkingen"></textarea>

<label id="signLabel">Handtekening</label>
<canvas id="sign" class="signature"></canvas>
<button onclick="clearSign()" class="secondary" id="clearSignBtn">Wis handtekening</button>

<button onclick="save()" class="primary" id="saveBtn">Opslaan</button>
<button onclick="downloadExcel()" class="secondary" id="excelBtn">Excel</button>
<button onclick="sendMail()" class="secondary" id="mailBtn">Mail</button>
<button onclick="window.print()" class="secondary" id="printBtn">Print</button>

</div>

<script>

function setLang(){
let en = document.getElementById("lang").value==="en";
title.innerText = en ? "Empty pallets AWC" : "Lege pallets AWC";
document.title = title.innerText;
saveBtn.innerText = en ? "Save" : "Opslaan";
excelBtn.innerText = en ? "Download Excel" : "Excel";
mailBtn.innerText = en ? "Send Email" : "Mail";
printBtn.innerText = en ? "Print" : "Print";
signLabel.innerText = en ? "Signature" : "Handtekening";
clearSignBtn.innerText = en ? "Clear signature" : "Wis handtekening";

euro.placeholder = en ? "Euro pallets" : "Europallets";
blok.placeholder = en ? "Block pallets" : "Blokpallets";
m2.placeholder = en ? "2 meter pallets" : "2 meter pallets";
dpb.placeholder = en ? "DPB pallets" : "DPB pallets";
name.placeholder = en ? "Name" : "Naam";
note.placeholder = en ? "Notes" : "Opmerkingen";
}

let today = new Date().toISOString().split('T')[0];
date.value = today;

function updateDay(){
let d = new Date(date.value).getDay();
let name = d===1?"Maandag":d===4?"Donderdag":"";
day.innerHTML = `<option>${name}</option>`;
}
updateDay();
date.addEventListener("change",updateDay);

let c = sign;
let ctx = c.getContext("2d");
let draw=false;

c.onmousedown=()=>draw=true;
c.onmouseup=()=>draw=false;
c.onmousemove=e=>{if(draw){ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();}};

c.ontouchstart=()=>draw=true;
c.ontouchend=()=>draw=false;
c.ontouchmove=e=>{if(draw){let r=c.getBoundingClientRect();ctx.lineTo(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);ctx.stroke();}};

function clearSign(){ctx.clearRect(0,0,c.width,c.height);}

// save
function save(){
let d = JSON.parse(localStorage.getItem("data")||"[]");
d.push({
date:date.value,loc:loc.value,euro:euro.value,blok:blok.value,m2:m2.value,dpb:dpb.value,name:name.value
});
localStorage.setItem("data",JSON.stringify(d));
alert("Opgeslagen");
}

// excel
function downloadExcel(){
let d = JSON.parse(localStorage.getItem("data")||"[]");
let csv="Datum;Loc;Euro;Blok;2m;DPB;Naam\n";
d.forEach(r=>csv+=`${r.date};${r.loc};${r.euro};${r.blok};${r.m2};${r.dpb};${r.name}\n`);
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="pallets.csv";
a.click();
}

// mail
function sendMail(){
let body=`Pallet telling
Locatie: ${loc.value}
Datum: ${date.value}
Euro: ${euro.value}
Blok: ${blok.value}
2m: ${m2.value}
DPB: ${dpb.value}
Naam: ${name.value}`;

window.location.href="mailto:warehouseh@amsterdamwarehouse.com?subject=Pallet telling&body="+encodeURIComponent(body);
}

</script>

</body>
</html>
