<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v3.1</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #3b82f6; --wa: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--card); padding: 10px; border-bottom: 2px solid var(--border); }
        .zending-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid var(--border); background: #000; color: #fff; font-size: 1rem; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; color: var(--wa); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 20px 0; margin-top: 10px; border-radius: 4px; }
        #trailer-canvas { height: 120px; width: 900px; background: #111; position: relative; border-right: 15px solid #444; margin-left: 20px; }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.9); font-size: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 2px; text-align: center; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input[type="number"] { width: 90px; height: 55px; background: #000; color: #fff; border: 2px solid var(--accent); border-radius: 10px; text-align: center; font-size: 1.6rem; font-weight: bold; }
        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .btn-wa { width: 100%; padding: 18px; background: var(--wa); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 900; font-size: 0.9rem;">WAREHOUSE MASTER v3.1</div>
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Ritnummer...">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Meters</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Pallets</span><span id="pal-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll"><div id="trailer-canvas"></div></div>
</div>

<div class="scroll-area">
    <div class="p-card">
        <div><b>Europallet</b><br><small style="color:#94a3b8">80 breed (3 p.r.)</small></div>
        <input type="number" id="q-euro" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Blokpallet</b><br><small style="color:#94a3b8">120 breed (2 p.r.)</small></div>
        <input type="number" id="q-blok" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Middel</b><br><small style="color:#94a3b8">80 breed (3 p.r.)</small></div>
        <input type="number" id="q-mid" placeholder="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Lang</b><br><small style="color:#94a3b8">80 breed (3 p.r.)</small></div>
        <input type="number" id="q-lang" placeholder="0" oninput="calculate()">
    </div>
</div>

<footer>
    <button class="btn-wa" onclick="sendWA()">VERSTUUR WHATSAPP</button>
</footer>

<script>
    function calculate() {
        const canvas = document.getElementById('trailer-canvas');
        canvas.innerHTML = '';
        let curX = 0, curY = 0, maxLRow = 0, totalP = 0;
        const SCALE = 0.5, T_WIDTH = 240;

        // Alle types worden nu op hun breedte geoptimaliseerd
        const types = [
            { id: 'EURO', q: parseInt(document.getElementById('q-euro').value) || 0, w: 80, l: 120, c: '#3b82f6' },
            { id: 'BLOK', q: parseInt(document.getElementById('q-blok').value) || 0, w: 120, l: 100, c: '#f59e0b' },
            { id: 'MID', q: parseInt(document.getElementById('q-mid').value) || 0, w: 80, l: 140, c: '#10b981' },
            { id: 'LANG', q: parseInt(document.getElementById('q-lang').value) || 0, w: 80, l: 200, c: '#ef4444' }
        ];

        types.forEach(p => {
            for(let i=0; i<p.q; i++) {
                totalP++;
                // Als de volgende pallet niet meer in de breedte (240) past, nieuwe rij
                if (curY + p.w > T_WIDTH) {
                    curY = 0;
                    curX += maxLRow;
                    maxLRow = 0;
                }
                
                const div = document.createElement('div');
                div.className = 'v-pallet';
                div.style.left = (curX * SCALE) + "px";
                div.style.top = (curY * SCALE) + "px";
                div.style.width = (p.l * SCALE) + "px";
                div.style.height = (p.w * SCALE) + "px";
                div.style.backgroundColor = p.c;
                div.innerText = p.id;
                canvas.appendChild(div);

                curY += p.w;
                if (p.l > maxLRow) maxLRow = p.l;
            }
        });

        const totalLM = (curX + maxLRow) / 100;
        document.getElementById('lm-out').innerText = totalLM.toFixed(2).replace('.', ',');
        document.getElementById('pal-out').innerText = totalP;
        document.getElementById('perc-out').innerText = Math.round((totalLM / 13.6) * 100) + "%";
    }

    function sendWA() {
        const z = document.getElementById('zending').value || "-";
        const msg = `*LAADPLAN*\nZending: ${z}\nMeters: ${document.getElementById('lm-out').innerText}\nPallets: ${document.getElementById('pal-out').innerText}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
