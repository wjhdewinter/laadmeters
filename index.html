<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laadmeter Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        label { flex: 1; font-size: 0.9em; font-weight: bold; }
        input { width: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 8px; text-align: center; }
        .total { font-size: 1.5em; font-weight: bold; color: #007bff; }
        p.hint { font-size: 0.8em; color: #666; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laadmeter App</h2>
    
    <div id="calculator">
        <div class="input-group">
            <label>Europallet (80x120)</label>
            <input type="number" id="euro" value="0" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Blokpallet (100x100)</label>
            <input type="number" id="blok" value="0" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Industrie (100x120)</label>
            <input type="number" id="industrie" value="0" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Lange pallet (200x80)</label>
            <input type="number" id="lang" value="0" min="0" oninput="calculate()">
        </div>
        <div class="input-group">
            <label>Middel pallet (140x80)</label>
            <input type="number" id="middel" value="0" min="0" oninput="calculate()">
        </div>

        <hr>

        <div class="input-group">
            <label>Stapelbaar? (Deel door 2)</label>
            <input type="checkbox" id="stapelbaar" onchange="calculate()">
        </div>
    </div>

    <div class="result-box">
        <div>Totaal aantal laadmeters:</div>
        <div class="total" id="totaalResultaat">0,00</div>
    </div>
    
    <p class="hint">Gebaseerd op vrachtwagenbreedte van 2,40m</p>
</div>

<script>
    function calculate() {
        // Factoren per pallet (Oppervlakte / 2.4)
        const euroFactor = 0.40;
        const blokFactor = 0.42;
        const industrieFactor = 0.50;
        const langFactor = 0.67;
        const middelFactor = 0.47;

        // Waarden ophalen
        let totaal = 0;
        totaal += document.getElementById('euro').value * euroFactor;
        totaal += document.getElementById('blok').value * blokFactor;
        totaal += document.getElementById('industrie').value * industrieFactor;
        totaal += document.getElementById('lang').value * langFactor;
        totaal += document.getElementById('middel').value * middelFactor;

        // Check voor stapelen
        if (document.getElementById('stapelbaar').checked) {
            totaal = totaal / 2;
        }

        // Weergeven
        document.getElementById('totaalResultaat').innerText = totaal.toFixed(2).replace('.', ',') + " m¹";
    }
</script>

</body>
</html>
