<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Intelligent Warehouse Loader</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER & TRAILER VISUAL */
        .header { background: var(--card); padding: 10px; border-bottom: 2px solid var(--border); }
        .trailer-bed { 
            width: 100%; height: 110px; border: 3px solid #94a3b8; background: #000; 
            display: flex; padding: 2px; gap: 2px; overflow-x: auto; position: relative;
            border-radius: 4px;
        }
        .trailer-column { display: flex; flex-direction: column; gap: 2px; height: 100%; flex-shrink: 0; border-left: 1px dashed #334155; }
        .p-unit { background: var(--accent); border: 1px solid rgba(255,255,255,0.4); flex: 1; min-width: 15px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 5px; border-radius: 4px; text-align: center; }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; opacity: 0.7; }

        /* INPUTS */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 40px; }
        .zending-input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: 1px solid var(--border); background: #000; color: #fff; font-weight: bold; }
        
        .pallet-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .pallet-name { font-weight: bold; font-size: 0.9rem; }
        
        .card-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input[type="number"] { width: 100%; height: 40px; background: #000; color: #fff; border: 1px solid var(--border); text-align: center; border-radius: 6px; font-size: 1rem; font-weight: bold; }
        select { width: 100%; height: 40px; background: #334155; color: #fff; border: none; border-radius: 6px; padding: 0 5px; font-size: 0.8rem; }

        footer { padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .btn-wa { width: 100%; padding: 15px; background: var(--wa); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Klantnaam...">
    <div class="trailer-bed" id="visual"></div>
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Laadmeter</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Totaal KG</span><span id="kg-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
</div>

<div class="scroll-area" id="pallet-list">
    <div class="pallet-card" data-name="Europallet">
        <div class="card-header"><span class="pallet-name">Euro (80x120)</span> <input type="number" class="qty" placeholder="Aantal" oninput="calc()"></div>
        <div class="card-controls">
            <select class="mode" onchange="calc()">
                <option value="80">In Lengte (3 n.e.)</option>
                <option value="120">In Breedte (2 n.e.)</option>
            </select>
            <input type="number" class="w" placeholder="Kg p/s" oninput="calc()">
        </div>
    </div>

    <div class="pallet-card" data-name="Blokpallet">
        <div class="card-header"><span class="pallet-name">Blok (100x120)</span> <input type="number" class="qty" placeholder="Aantal" oninput="calc()"></div>
        <div class="card-controls">
            <select class="mode" onchange="calc()">
                <option value="100">In Lengte (2 n.e.)</option>
                <option value="120">In Breedte (2 n.e.)</option>
            </select>
            <input type="number" class="w" placeholder="Kg p/s" oninput="calc()">
        </div>
    </div>

    <div class="pallet-card" data-name="Middel pallet">
        <div class="card-header"><span class="pallet-name">Mid (140x80)</span> <input type="number" class="qty" placeholder="Aantal" oninput="calc()"></div>
        <div class="card-controls">
            <select class="mode" onchange="calc()">
                <option value="80">In Breedte (3 n.e.)</option>
                <option value="140">In Lengte (1 n.e.)</option>
            </select>
            <input type="number" class="w" placeholder="Kg p/s" oninput="calc()">
        </div>
    </div>

    <div class="pallet-card" data-name="Lange pallet">
        <div class="card-header"><span class="pallet-name">Lang (200x80)</span> <input type="number" class="qty" placeholder="Aantal" oninput="calc()"></div>
        <div class="card-controls">
            <select class="mode" onchange="calc()">
                <option value="80">In Breedte (3 n.e.)</option>
                <option value="200">In Lengte (1 n.e.)</option>
            </select>
            <input type="number" class="w" placeholder="Kg p/s" oninput="calc()">
        </div>
    </div>
</div>

<footer>
    <div style="margin-bottom:10px;"><label><input type="checkbox" id="stack" onchange="calc()"> <b>ALLES GESTAPELD</b></label></div>
    <button class="btn-wa" onclick="sendWA()">WHATSAPP VERZENDEN</button>
</footer>

<script>
    function calc() {
        let totalLM = 0, totalKG = 0;
        const visual = document.getElementById('visual');
        visual.innerHTML = '';
        const TRAILER_WIDTH = 240;

        document.querySelectorAll('.pallet-card').forEach(card => {
            const qty = parseInt(card.querySelector('.qty').value) || 0;
            const weight = parseFloat(card.querySelector('.w').value) || 0;
            const frontSize = parseInt(card.querySelector('.mode').value); // De maat die naar voren wijst
            
            // Intelligent bepalen van de andere maat (de breedte-maat)
            let sideSize;
            const name = card.dataset.name;
            if(name === "Europallet") sideSize = (frontSize === 80) ? 120 : 80;
            else if(name === "Blokpallet") sideSize = (frontSize === 100) ? 120 : 100;
            else if(name === "Middel pallet") sideSize = (frontSize === 80) ? 140 : 80;
            else if(name === "Lange pallet") sideSize = (frontSize === 80) ? 200 : 80;

            // Hoeveel passen er naast elkaar in de 240cm?
            const numLanes = Math.floor(TRAILER_WIDTH / sideSize);
            const factorPerPallet = frontSize / 100 / numLanes;

            totalLM += (qty * factorPerPallet);
            totalKG += (qty * weight);

            // Visueel bouwen per kolom
            let col;
            for(let i=0; i<qty; i++) {
                if(i % numLanes === 0) {
                    col = document.createElement('div');
                    col.className = 'trailer-column';
                    // We schalen de kolombreedte op basis van de frontSize t.o.v. trailerlengte
                    col.style.width = (frontSize / 1360 * 100) + "%";
                    visual.appendChild(col);
                }
                let p = document.createElement('div');
                p.className = 'p-unit';
                col.appendChild(p);
            }
        });

        if(document.getElementById('stack').checked) totalLM /= 2;

        document.getElementById('lm-out').innerText = totalLM.toFixed(2).replace('.', ',');
        document.getElementById('kg-out').innerText = Math.round(totalKG);
        const pPerc = (totalLM / 13.6) * 100;
        document.getElementById('perc-out').innerText = Math.round(pPerc) + "%";
        visual.style.borderColor = pPerc > 100 ? "var(--danger)" : "#94a3b8";
    }

    function sendWA() {
        const zn = document.getElementById('zending').value || "Niet opgegeven";
        let list = "";
        document.querySelectorAll('.pallet-card').forEach(card => {
            const q = card.querySelector('.qty').value;
            if(q > 0) list += `- ${q}x ${card.dataset.name} (${card.querySelector('.mode').selectedOptions[0].text})%0A`;
        });
        let msg = `*WAREHOUSE LOADING*%0A%0A*Zending:* ${zn}%0A*Lading:*%0A${list}%0A*Totalen:*%0A- LM: ${document.getElementById('lm-out').innerText}%0A- KG: ${document.getElementById('kg-out').innerText}`;
        window.open(`https://wa.me/?text=${msg}`);
    }
</script>
</body>
</html>
