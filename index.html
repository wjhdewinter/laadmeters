<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v3.9</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #3b82f6; --wa: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
        .header { background: var(--card); padding: 12px; border-bottom: 2px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.2rem; font-weight: 900; color: var(--wa); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 20px 0; margin: 12px 0; border-radius: 6px; border: 1px solid var(--border); }
        #trailer-canvas { height: 120px; width: 1600px; background: #111; position: relative; border-right: 15px solid #444; margin-left: 20px; }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.9); font-size: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 2px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .mode-btn { background: #000; color: var(--accent); border: 1px solid var(--accent); padding: 8px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        input[type="number"] { width: 90px; height: 55px; background: #000; color: #fff; border: 2px solid var(--accent); border-radius: 12px; text-align: center; font-size: 1.8rem; font-weight: 900; }
        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .btn-wa { width: 100%; padding: 22px; background: var(--wa); color: white; border: none; border-radius: 14px; font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; gap: 12px; box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4); }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="zending" style="width:100%; padding:14px; background:#000; color:#fff; border:2px solid var(--border); border-radius:10px; font-weight:bold;" placeholder="Ritnummer / Chauffeur...">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Meters</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Pallets</span><span id="pal-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll"><div id="trailer-canvas"></div></div>
</div>

<div class="scroll-area">
    <div class="p-card">
        <div><b>Euro (80x120)</b><br><small style="color:#94a3b8">Slimme 3L/2B mix</small></div>
        <input type="number" id="q-euro" value="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Blok (120x100)</b><br><small style="color:#94a3b8">120 breed</small></div>
        <input type="number" id="q-blok" value="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div><b>Middel (80x140)</b><br><small style="color:#94a3b8">140 breed (Zijkant)</small></div>
        <input type="number" id="q-mid" value="0" oninput="calculate()">
    </div>
    <div class="p-card">
        <div>
            <b>Lang (80x200)</b><br>
            <button class="mode-btn" id="lang-mode" onclick="toggleLangMode()">LADEN: IN LENGTE (200cm)</button>
        </div>
        <input type="number" id="q-lang" value="0" oninput="calculate()">
    </div>
</div>

<footer>
    <button class="btn-wa" onclick="sendWA()">🚀 VERSTUUR VISUEEL PLAN</button>
</footer>

<script>
    let langIsLengte = true;
    let visualMap = [];

    function toggleLangMode() {
        langIsLengte = !langIsLengte;
        document.getElementById('lang-mode').innerText = langIsLengte ? "LADEN: IN LENGTE (200cm)" : "LADEN: OVERDWARS (80cm)";
        calculate();
    }

    function calculate() {
        const canvas = document.getElementById('trailer-canvas');
        canvas.innerHTML = '';
        visualMap = [];
        let curX = 0, curY = 0, maxLRow = 0;
        const T_WIDTH = 240;

        let pool = [];
        const add = (id, q, w, l, c, em) => { for(let i=0; i<q; i++) pool.push({id, w, l, c, em}); };
        
        add('E', parseInt(document.getElementById('q-euro').value)||0, 80, 120, '#3b82f6', '🟦');
        add('B', parseInt(document.getElementById('q-blok').value)||0, 120, 100, '#f59e0b', '🟧');
        add('M', parseInt(document.getElementById('q-mid').value)||0, 140, 80, '#10b981', '🟩');
        add('L', parseInt(document.getElementById('q-lang').value)||0, langIsLengte?80:200, langIsLengte?200:80, '#ef4444', '🟥');

        document.getElementById('pal-out').innerText = pool.length;
        let currentRow = [];

        while(pool.length > 0) {
            let found = false;
            // Sorteer pool om gaten te vullen: probeer grootste resterende breedte te vullen
            for(let i=0; i<pool.length; i++) {
                if (curY + pool[i].w <= T_WIDTH) {
                    let p = pool.splice(i, 1)[0];
                    drawPallet(canvas, curX, curY, p.w, p.l, p.c, p.id);
                    currentRow.push(p.em);
                    curY += p.w;
                    if (p.l > maxLRow) maxLRow = p.l;
                    found = true;
                    break;
                }
            }
            if (!found) {
                visualMap.push(currentRow.join(''));
                currentRow = [];
                curY = 0; curX += maxLRow; maxLRow = 0;
            }
        }
        if(currentRow.length > 0) visualMap.push(currentRow.join(''));

        const totalLM = (curX + maxLRow) / 100;
        document.getElementById('lm-out').innerText = totalLM.toFixed(2).replace('.', ',');
        document.getElementById('perc-out').innerText = Math.round((totalLM / 13.6) * 100) + "%";
    }

    function drawPallet(canvas, x, y, w, l, color, text) {
        const d = document.createElement('div');
        d.className = 'v-pallet';
        d.style.left = (x*0.5)+"px"; d.style.top = (y*0.5)+"px";
        d.style.width = (l*0.5)+"px"; d.style.height = (w*0.5)+"px";
        d.style.backgroundColor = color; d.innerText = text;
        canvas.appendChild(d);
    }

    function sendWA() {
        const z = document.getElementById('zending').value || "Onbekend";
        let msg = `*🚛 LAADPLAN: ${z}*\n`;
        msg += `📏 *Meters:* ${document.getElementById('lm-out').innerText}m\n`;
        msg += `📦 *Pallets:* ${document.getElementById('pal-out').innerText}\n\n`;
        msg += `*TEKENING (Kops ➔ Achter):*\n`;
        visualMap.forEach((row, i) => msg += `Rij ${i+1}: | ${row} |\n`);
        msg += `\n*LEGENDA:*\n🟦=Euro | 🟧=Blok | 🟩=Middel | 🟥=Lang\n`;
        msg += `_Lange pallet stand: ${langIsLengte ? "LENGTE (2.00m)" : "BREEDTE (0.80m)"}_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
    window.onload = calculate;
</script>
</body>
</html>
