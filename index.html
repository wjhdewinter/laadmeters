<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v4.2</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --border: #334155; --accent: #3b82f6; --wa: #22c55e; }
        * { box-sizing: border-box; font-family: sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--card); padding: 12px; border-bottom: 2px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; color: var(--wa); }
        .stat-lbl { font-size: 0.6rem; text-transform: uppercase; color: #94a3b8; }
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 15px 0; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); }
        #trailer-canvas { height: 120px; width: 1600px; background: #000; position: relative; border-right: 15px solid #444; margin-left: 20px; }
        .v-pallet { position: absolute; border: 1px solid rgba(255,255,255,0.8); font-size: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 2px; }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; }
        .p-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        input[type="number"] { width: 80px; height: 50px; background: #000; color: #fff; border: 2px solid var(--accent); border-radius: 10px; text-align: center; font-size: 1.6rem; font-weight: 900; }
        footer { padding: 15px; background: var(--card); }
        .btn-wa { width: 100%; padding: 18px; background: var(--wa); color: white; border: none; border-radius: 14px; font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="zending" style="width:100%; padding:10px; background:#000; color:#fff; border:1px solid var(--border); border-radius:8px;" placeholder="Ritnummer...">
    <div class="stats-grid">
        <div class="stat-box"><span class="stat-lbl">Meters</span><span id="lm-out" class="stat-val">0,00</span></div>
        <div class="stat-box"><span class="stat-lbl">Pallets</span><span id="pal-out" class="stat-val">0</span></div>
        <div class="stat-box"><span class="stat-lbl">Vulling</span><span id="perc-out" class="stat-val">0%</span></div>
    </div>
    <div class="trailer-scroll"><div id="trailer-canvas"></div></div>
</div>

<div class="scroll-area">
    <div class="p-card"><div><b>Euro (80x120)</b><br><small style="color:#94a3b8">3 naast elkaar = 1,20m</small></div><input type="number" id="q-euro" value="0" oninput="calculate()"></div>
    <div class="p-card"><div><b>Blok (120x100)</b><br><small style="color:#94a3b8">2 naast elkaar = 1,00m</small></div><input type="number" id="q-blok" value="0" oninput="calculate()"></div>
    <div class="p-card"><div><b>Middel (80x140)</b><br><small style="color:#94a3b8">140 breed</small></div><input type="number" id="q-mid" value="0" oninput="calculate()"></div>
    <div class="p-card"><div><b>Lang (80x200)</b><br><small style="color:#94a3b8">Smart-Fit</small></div><input type="number" id="q-lang" value="0" oninput="calculate()"></div>
</div>

<footer><button class="btn-wa" onclick="sendWA()">📲 VERSTUUR LAADPLAN</button></footer>

<script>
    function calculate() {
        const canvas = document.getElementById('trailer-canvas');
        canvas.innerHTML = '';
        let curX = 0, curY = 0, maxLRow = 0;
        const T_WIDTH = 240, SCALE = 0.5;

        let pool = [];
        // EURO: Breedte 80, Lengte 120
        const add = (id, q, w, l, c, em) => { for(let i=0; i<q; i++) pool.push({id, w, l, c, em}); };
        add('E', parseInt(document.getElementById('q-euro').value)||0, 80, 120, '#3b82f6', '🟦');
        add('B', parseInt(document.getElementById('q-blok').value)||0, 120, 100, '#f59e0b', '🟧');
        add('M', parseInt(document.getElementById('q-mid').value)||0, 140, 80, '#10b981', '🟩');
        add('L', parseInt(document.getElementById('q-lang').value)||0, 80, 200, '#ef4444', '🟥');

        document.getElementById('pal-out').innerText = pool.length;
        window.visualMap = []; let currentRow = [];

        while(pool.length > 0) {
            let bestIdx = -1, rotated = false;
            for(let i=0; i<pool.length; i++) {
                let p = pool[i];
                // Probeer eerst de standaard breedte
                if(curY + p.w <= T_WIDTH) { bestIdx = i; rotated = false; break; }
                // Dan pas gedraaid (voor de Euro's: 120 breed)
                if(curY + p.l <= T_WIDTH) { bestIdx = i; rotated = true; break; }
            }

            if(bestIdx !== -1) {
                let p = pool.splice(bestIdx, 1)[0];
                let w = rotated ? p.l : p.w;
                let l = rotated ? p.w : p.l;
                
                const d = document.createElement('div');
                d.className = 'v-pallet';
                d.style.left = (curX*SCALE)+"px"; d.style.top = (curY*SCALE)+"px";
                d.style.width = (l*SCALE)+"px"; d.style.height = (w*SCALE)+"px";
                d.style.backgroundColor = p.c; d.innerText = p.id;
                canvas.appendChild(d);

                currentRow.push(p.em);
                curY += w;
                if(l > maxLRow) maxLRow = l;
            } else {
                window.visualMap.push(currentRow.join(''));
                currentRow = []; curY = 0; curX += maxLRow; maxLRow = 0;
            }
        }
        if(currentRow.length > 0) window.visualMap.push(currentRow.join(''));

        const totalLM = (curX + maxLRow) / 100;
        document.getElementById('lm-out').innerText = totalLM.toFixed(2).replace('.', ',');
        document.getElementById('perc-out').innerText = Math.round((totalLM / 13.6) * 100) + "%";
    }

    function sendWA() {
        const z = document.getElementById('zending').value || "-";
        let msg = `*🚛 LAADPLAN*\nRef: ${z}\nMeters: ${document.getElementById('lm-out').innerText}m\n\n*INDELING:*\n`;
        window.visualMap.forEach((r, i) => msg += `R${i+1}: [${r}]\n`);
        msg += `\n🟦E|🟧B|🟩M|🟥L`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }
    window.onload = calculate;
</script>
</body>
</html>
