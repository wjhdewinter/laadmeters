<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Trailer Planner Grid</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: sans-serif; color: var(--text); display: flex; flex-direction: column;
        }

        .trailer-section {
            background: var(--card); padding: 12px; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .zending-input {
            width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 6px;
            border: 1px solid var(--border); background: #000; color: #fff;
        }

        /* DE VISUELE TRAILER ALS RASTER */
        .trailer-bed {
            width: 100%; height: 70px; border: 2px solid #94a3b8; border-radius: 4px;
            background: #000; display: flex; align-items: flex-start; 
            padding: 2px; overflow: hidden; position: relative;
        }
        .grid-layer {
            display: flex; flex-wrap: wrap; flex-direction: column;
            height: 100%; gap: 2px; width: 100%;
        }
        .p-block {
            height: calc(50% - 2px); /* Twee rijen pallets */
            background: var(--accent); border: 1px solid white; border-radius: 1px;
            transition: width 0.3s;
        }
        .over-limit { border-color: var(--danger); box-shadow: inset 0 0 10px var(--danger); }

        .stats { display: flex; justify-content: space-between; margin-top: 8px; font-weight: bold; font-size: 0.8rem; }

        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; }
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; margin-bottom: 6px; background: var(--card);
            border: 1px solid var(--border); border-radius: 10px;
        }
        .name { font-weight: bold; font-size: 0.85rem; }
        input[type="number"] {
            width: 55px; height: 38px; border: 1px solid var(--border);
            border-radius: 6px; text-align: center; font-size: 1rem;
            background: #000; color: white;
        }

        footer { padding: 10px; background: var(--card); border-top: 1px solid var(--border); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; margin-bottom: 6px; }
        .btn-wa { background: var(--wa); }
        .btn-clear { background: #475569; font-size: 0.8rem; }
        
        .mode-select { margin-bottom: 8px; display: flex; gap: 10px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="trailer-section">
    <input type="text" id="zending" class="zending-input" placeholder="Zending / Ritnummer...">
    <div class="trailer-bed" id="trailer-visual">
        <div id="grid" class="grid-layer"></div>
    </div>
    <div class="stats">
        <span>LM: <span id="lm-display">0,00</span></span>
        <span>KG: <span id="kg-display">0</span></span>
        <span>Vulling: <span id="perc-display">0</span>%</span>
    </div>
    <div class="mode-select">
        <label><input type="checkbox" id="stack" onchange="calc()"> STAPELBAAR</label>
        <label><input type="radio" name="mode" value="breedte" checked onchange="calc()"> BREEDTE</label>
        <label><input type="radio" name="mode" value="lengte" onchange="calc()"> LENGTE</label>
    </div>
</div>

<div class="scroll-area">
    <div class="pallet-row" data-name="Mini">
        <span class="name">Mini (80x60)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.20" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Euro">
        <span class="name">Euro (80x120)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.40" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Blok">
        <span class="name">Blok (100x100)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.42" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Indu">
        <span class="name">Indu (100x120)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.50" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Mid">
        <span class="name">Mid (140x80)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.47" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
    <div class="pallet-row" data-name="Lang">
        <span class="name">Lang (200x80)</span>
        <div style="display:flex; gap:4px;"><input type="number" class="qty" data-f="0.67" oninput="calc()"><input type="number" class="w" oninput="calc()"></div>
    </div>
</div>

<footer>
    <button class="btn btn-wa" onclick="sendWA()">STUUR WHATSAPP</button>
    <button class="btn btn-clear" onclick="location.reload()">RESET</button>
</footer>

<script>
    function calc() {
        let lm = 0, kg = 0, totalPallets = 0;
        const grid = document.getElementById('grid');
        const mode = document.querySelector('input[name="mode"]:checked').value;
        grid.innerHTML = '';
        
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = parseInt(row.querySelector('.qty').value) || 0;
            const f = parseFloat(row.querySelector('.qty').dataset.f);
            const w = parseFloat(row.querySelector('.w').value) || 0;
            
            lm += (q * f);
            kg += (q * w);
            totalPallets += q;

            // Teken pallets in het grid (2 pallets naast elkaar in breedte-modus)
            for(let i=0; i<q; i++) {
                let p = document.createElement('div');
                p.className = 'p-block';
                // Bereken breedte van blokje: laadmeter factor t.o.v. trailerlengte (13.6)
                // In breedte-modus (33 euro's) delen we de visuele last door 2 rijen
                let visualWidth = (f / 13.6) * 100;
                p.style.width = (mode === 'breedte' ? visualWidth * 2 : visualWidth) + "%";
                grid.appendChild(p);
            }
        });

        if (document.getElementById('stack').checked) lm /= 2;
        
        const p = (lm / 13.6) * 100;
        document.getElementById('lm-display').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('kg-display').innerText = Math.round(kg);
        document.getElementById('perc-display').innerText = Math.round(p);
        
        document.getElementById('trailer-visual').classList.toggle('over-limit', p > 100);
    }

    function sendWA() {
        const zn = document.getElementById('zending').value || "Geen nr";
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let detail = "";
        document.querySelectorAll('.pallet-row').forEach(row => {
            const q = row.querySelector('.qty').value;
            if(q > 0) detail += `- ${q}x ${row.dataset.name}%0A`;
        });

        let t = `*RIT OVERZICHT*%0A%0A*Zending:* ${zn}%0A*Wijze:* Laden in ${mode}%0A*Pallets:*%0A${detail}%0A*LM:* ${document.getElementById('lm-display').innerText} m¹%0A*KG:* ${document.getElementById('kg-display').innerText} kg`;
        window.open(`https://wa.me/?text=${t}`);
    }
</script>
</body>
</html>
