<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master v2.3</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --border: #475569; --accent: #3b82f6; --danger: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: -apple-system, sans-serif; color: var(--text); 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER & TAAL */
        .header { background: var(--card); padding: 12px; border-bottom: 2px solid var(--border); }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lang-switch { background: #000; border: 1px solid var(--border); color: #fff; padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; }
        
        .zending-input { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; 
            border: 2px solid var(--border); background: #000; color: #fff; 
            font-size: 1rem; font-weight: bold; outline: none;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-val { display: block; font-size: 1.1rem; font-weight: 900; }
        .stat-lbl { font-size: 0.55rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }

        /* TRAILER VISUAL */
        .trailer-scroll { width: 100%; overflow-x: auto; background: #000; padding: 15px 0; border-radius: 6px; border: 1px solid #444; }
        #trailer-canvas { height: 120px; width: 680px; background: #111; position: relative; border-right: 12px solid #334155; margin: 0 15px; }
        .v-pallet { 
            position: absolute; border: 1px solid rgba(255,255,255,0.8); 
            font-size: 8px; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; border-radius: 2px; text-align: center;
        }

        /* LIJST */
        .scroll-area { flex: 1; overflow-y: auto; padding: 12px; }
        .p-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .p-info b { display: block; font-size: 0.9rem; color: #fff; }
        .p-info span { font-size: 0.65rem; color: #94a3b8; font-weight: bold; }
        
        .input-group { display: flex; gap: 6px; }
        .input-wrapper { display: flex; flex-direction: column; align-items: center; }
        .input-wrapper label { font-size: 0.55rem; margin-bottom: 3px; color: #94a3b8; font-weight: 800; }
        input[type="number"] { 
            width: 65px; height: 45px; background: #000; color: #fff; 
            border: 2px solid var(--border); border-radius: 8px; 
            text-align: center; font-size: 1.1rem; font-weight: bold; 
        }

        /* FOOTER */
        footer { padding: 15px; background: var(--card); border-top: 2px solid var(--border); }
        .footer-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-reset { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); font-weight: bold; border-radius: 6px; padding: 8px 15px; font-size: 0.8rem; }
        
        .btn-wa { 
            width: 100%; padding: 16px; background: var(--wa); color: white; 
            border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 4px 0 #15803d;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div style="font-weight: 900; font-size: 0.9rem; letter-spacing: 1px;">WAREHOUSE MASTER</div>
        <select class="lang-switch" id="lang" onchange="changeLang()">
            <option
