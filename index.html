<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warehouse Master</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --accent: #22c55e; --border: #334155; --reset: #ef4444; --wa: #25d366;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; height: 100vh; background: var(--bg); 
            font-family: -apple-system, sans-serif; color: var(--text); overflow: hidden;
            display: flex; flex-direction: column;
        }
        header { padding: 20px; text-align: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .scroll-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 180px; }
        
        .pallet-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; margin-bottom: 10px; background: var(--card);
            border: 1px solid var(--border); border-radius: 12px;
        }
        .info { display: flex; flex-direction: column; }
        .name { font-weight: bold; }
        .dims { font-size: 0.8rem; color: #94a3b8; }
        
        .inputs-right { display: flex; gap: 8px; align-items: center; }
        input[type="number"] {
            width: 65px; height: 45px; border: 2px solid var(--border);
            border-radius: 8px; text-align: center; font-size: 1.1rem;
            background: #000; color: white; font-weight: bold;
        }

        .capacity-bar {
            height: 10px; background: #334155; border-radius: 5px; margin: 15px 0; overflow: hidden;
        }
        #progress { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; }

        footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--card); padding: 15px; border-top: 2px solid var(--border);
            display: flex; flex-direction: column; gap: 12px;
        }
        .footer-top { display: flex; justify-content: space-between; align-items: center; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .res-box { background: var(--accent); padding: 10px; border-radius: 10px; text-align: center; }
        .res-box.weight { background: #3b82f6; }
        .total-val { font-size: 1.4rem; font-weight: 900; display: block; }
        .btn-wa { background: var(--wa); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; font-size: 1rem; }
    </style>
</head>
<body>

<header>Warehouse Master v1.0</header>

<div class="scroll-area">
    <div class="capacity-bar"><div id="progress"></div></div>
    
    <div id="pallet-container">
        <div class="pallet-row">
            <div class="info"><span class="name">Mini (80x60)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.20" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
        <div class="pallet-row">
            <div class="info"><span class="name">Euro (80x120)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.40" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
        <div class="pallet-row">
            <div class="info"><span class="name">Blok (100x100)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.42" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
        <div class="pallet-row">
            <div class="info"><span class="name">Indu (100x120)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.50" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
        <div class="pallet-row">
            <div class="info"><span class="name">Middel (140x80)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.47" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
        <div class="pallet-row">
            <div class="info"><span class="name">Lang (200x80)</span><span class="dims">Kg p/st:</span></div>
            <div class="inputs-right">
                <input type="number" class="qty" data-factor="0.67" placeholder="Aantal" oninput="calc()" pattern="\d*">
                <input type="number" class="w-input" placeholder="Kg" oninput="calc()" pattern="\d*">
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="footer-top">
        <label><input type="checkbox" id="stack" onchange="calc()"> STAPELEN</label>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--reset); font-weight:bold;">RESET</button>
    </div>
    <div class="result-grid">
        <div class="res-box"><span style="font-size:0.7rem">LAADMETERS</span><span id="total-lm" class="total-val">0,00</span></div>
        <div class="res-box weight"><span style="font-size:0.7rem">TOTAAL KG</span><span id="total-kg" class="total-val">0</span></div>
    </div>
    <button class="btn-wa" onclick="sendWA()">VERSTUUR VIA WHATSAPP</button>
</footer>

<script>
    function calc() {
        let lm = 0; let kg = 0;
        const rows = document.querySelectorAll('.pallet-row');
        
        rows.forEach(row => {
            const q = parseFloat(row.querySelector('.qty').value) || 0;
            const factor = parseFloat(row.querySelector('.qty').dataset.factor);
            const w = parseFloat(row.querySelector('.w-input').value) || 0;
            
            lm += (q * factor);
            kg += (q * w);
        });

        if (document.getElementById('stack').checked) lm /= 2;

        document.getElementById('total-lm').innerText = lm.toFixed(2).replace('.', ',');
        document.getElementById('total-kg').innerText = Math.round(kg);
        
        let perc = (lm / 13.6) * 100;
        document.getElementById('progress').style.width = Math.min(perc, 100) + "%";
        document.getElementById('progress').style.background = perc > 100 ? "var(--reset)" : "var(--accent)";
    }

    function sendWA() {
        let lm = document.getElementById('total-lm').innerText;
        let kg = document.getElementById('total-kg').innerText;
        let stapel = document.getElementById('stack').checked ? "Ja" : "Nee";
        let text = `*Warehouse Overzicht*%0A------------------%0ALaadmeters: ${lm} m¹%0AGewicht: ${kg} kg%0AStapelbaar: ${stapel}%0A------------------`;
        window.open(`https://wa.me/?text=${text}`);
    }
</script>
</body>
</html>
